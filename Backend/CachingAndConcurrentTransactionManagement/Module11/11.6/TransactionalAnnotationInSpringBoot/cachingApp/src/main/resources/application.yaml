spring:
  application:
    name: cachingApp

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379
#      username: ${REDIS_USERNAME}
#      password: ${REDIS_PASSWORD}
      timeout: 5s

logging:
  level:
    org.springframework: DEBUG